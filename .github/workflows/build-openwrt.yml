name: зј–иҜ‘еӣәд»¶
on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      REPO_URL:
        description: 'иҜ·иҫ“е…ҘжӮЁиҰҒзј–иҜ‘зҡ„жәҗз Ғд»“еә“'
        required: true
        default: 'coolsnowwolf/lede'
      REPO_BRANCH:
        description: 'иҜ·иҫ“е…Ҙжәҗз Ғзҡ„еҲҶж”Ҝ'
        required: true
        default: 'master'
      CONFIG_FILE:
        description: 'иҜ·иҫ“е…Ҙset_configж–Үд»¶еӨ№йҮҢзҡ„й…ҚзҪ®ж–Үд»¶еҗҚз§°'
        required: true
        default: 'x86_64'
      DIY_PART_SH:
        description: 'иҜ·йҖүжӢ©LUCIзүҲжң¬зҡ„иҮӘе®ҡд№үж–Үд»¶'
        required: true
        default: '1806-luci.sh'
        type: choice
        options:
          - '1806-luci.sh'
          - '1907-luci.sh'
      days:
        description: 'жё…зҗҶ[X]еӨ©д№ӢеүҚзҡ„Artifacts'
        required: true
        default: '7'
      rele:
        description: 'дҝқз•ҷ[X]дёӘReleasesдёҚиў«еҲ йҷӨ'
        required: true
        default: '10'
      UPLOAD_FIRMWARE:
        description: 'дёҠдј еӣәд»¶еҲ° Artifacts'
        required: false
        default: 'true'
        type: boolean
      UPLOAD_RELEASE:
        description: 'еҸ‘еёғеӣәд»¶еҲ° Releases'
        required: false
        default: 'false'
        type: boolean
      CACHEWRTBUILD_SWITCH:
        description: 'зј“еӯҳеҠ йҖҹзј–иҜ‘'
        required: false
        default: 'true'
        type: boolean
        
env:
  DIY_SOURCE: diy
  DIY_FILES: files
  DIY_PATCH: patches
  FEEDS_CONF: feeds.conf.default
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    if: ${{ github.event.repository.owner.id }} == ${{ github.event.sender.id }}
    name: ${{ inputs.REPO_URL }}

    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: иҜ»еҸ–еҸҳйҮҸ
      run: |
        export SOURCE="$(echo "${{ inputs.REPO_URL }}" |cut -d"/" -f1)"
        export LUCI_VERSION="$(echo "${{ inputs.REPO_BRANCH }}" |cut -d"-" -f2-)"
        export DIY_WORK="${SOURCE}$(echo "${LUCI_VERSION}" |tr -d '\`.`')"
        echo "SOURCE=${SOURCE}" >> $GITHUB_ENV
        echo "LUCI_VERSION=${LUCI_VERSION}" >> $GITHUB_ENV
        echo "DIY_WORK=${DIY_WORK}" >> $GITHUB_ENV

    - name: йғЁзҪІзј–иҜ‘зҺҜеўғ
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /usr/lib/jvm /opt/ghc /swapfile
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.eu.org/init_build_environment.sh)'
        sudo -E apt-get -qq install -y rename pigz libfuse-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /${{ env.DIY_WORK }}
        sudo chown $USER:$GROUPS /${{ env.DIY_WORK }}

    - name: жӢүеҸ–${{ inputs.REPO_URL }}жәҗз Ғ
      working-directory: /${{ env.DIY_WORK }}
      run: |
        df -hT $PWD
        git clone https://github.com/${{ inputs.REPO_URL }} -b ${{ inputs.REPO_BRANCH }} openwrt
        ln -sf /${{ env.DIY_WORK }}/openwrt $GITHUB_WORKSPACE/openwrt
        echo "HOME_PATH=$GITHUB_WORKSPACE/openwrt" >> $GITHUB_ENV
        echo "ZZZ_PATH=$(find "$GITHUB_WORKSPACE/openwrt/package" -type f -name "*-default-settings")" >> $GITHUB_ENV
        export GENERATE_PATH="${GITHUB_WORKSPACE}/openwrt/package/base-files/files/bin/config_generate"
        echo "GENERATE_PATH=${GENERATE_PATH}" >> $GITHUB_ENV
        echo "IPADDR=$(grep "ipaddr:-" "${GENERATE_PATH}" |grep -v 'addr_offset' |grep -Eo "[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+")" >> $GITHUB_ENV

    - name: иҜ»еҸ–иҮӘе®ҡд№үж–Үд»¶
      run: |
        cd openwrt
        ./scripts/feeds update -a > /dev/null 2>&1
        [[ -f "$GITHUB_WORKSPACE/${{ env.FEEDS_CONF }}" ]] && mv -f $GITHUB_WORKSPACE/${{ env.FEEDS_CONF }} feeds.conf.default
        [[ -d "$GITHUB_WORKSPACE/${{ env.DIY_SOURCE }}" ]] && cp -Rf $GITHUB_WORKSPACE/${{ env.DIY_SOURCE }}/* $GITHUB_WORKSPACE/openwrt/
        [[ -d "$GITHUB_WORKSPACE/${{ env.DIY_FILES }}" ]] && mv -f $GITHUB_WORKSPACE/${{ env.DIY_FILES }}/* files
        [[ -d "$GITHUB_WORKSPACE/${{ env.DIY_PACTH }}" ]] && \
        find "$GITHUB_WORKSPACE/${{ env.DIY_PACTH }}" -type f -name '*.patch' -print0 | sort -z | xargs -I % -t -0 -n 1 sh -c "cat '%'  | patch -d './' -p1 --forward --no-backup-if-mismatch"
        chmod +x $GITHUB_WORKSPACE/${{ inputs.DIY_PART_SH }}
        $GITHUB_WORKSPACE/${{ inputs.DIY_PART_SH }}

    - name: е®үиЈ…жәҗз ҒжҸ’д»¶жәҗ
      run: |
        cd openwrt
        if [[ "${{ inputs.DIY_PART_SH }}" == "1907-luci.sh" ]]; then
          wget -q https://raw.githubusercontent.com/281677160/common-main/main/language/zh_Hans.sh -O ${HOME_PATH}/zh_Hans.sh
          sudo chmod +x ${HOME_PATH}/zh_Hans.sh
          /bin/bash ${HOME_PATH}/zh_Hans.sh
          rm -rf ${HOME_PATH}/zh_Hans.sh
        fi
        ./scripts/feeds update -a
        ./scripts/feeds install -a > /dev/null 2>&1
        ./scripts/feeds install -a
        [[ -f "$GITHUB_WORKSPACE/set_config/${{ inputs.CONFIG_FILE }}" ]] && \
        cp -Rf $GITHUB_WORKSPACE/set_config/${{ inputs.CONFIG_FILE }} ${HOME_PATH}/.config
        echo "CONFIG_PACKAGE_luci=y" >> ${HOME_PATH}/.config

    - name: дёӢиҪҪиҪҜд»¶жәҗ
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        export TARGET_BOARD="$(awk -F '[="]+' '/TARGET_BOARD/{print $2}' ${HOME_PATH}/.config)"
        export TARGET_SUBTARGET="$(awk -F '[="]+' '/TARGET_SUBTARGET/{print $2}' ${HOME_PATH}/.config)"
        export TARGET_PROFILE_DG="$(awk -F '[="]+' '/TARGET_PROFILE/{print $2}' ${HOME_PATH}/.config)"
        if [[ `grep -Eoc 'CONFIG_TARGET_x86_64=y' ${HOME_PATH}/.config` -eq '1' ]]; then
          echo "TARGET_PROFILE=x86-64" >> $GITHUB_ENV
        elif [[ `grep -Eoc 'CONFIG_TARGET_x86=y' ${HOME_PATH}/.config` -eq '1' ]]; then
          echo "TARGET_PROFILE=x86-32" >> $GITHUB_ENV
        elif [[ `grep -Eoc 'CONFIG_TARGET_armvirt_64_Default=y' ${HOME_PATH}/.config` -eq '1' ]]; then
          echo "TARGET_PROFILE=Armvirt_64" >> $GITHUB_ENV
        elif [[ `grep -Eoc "CONFIG_TARGET.*DEVICE.*=y" ${HOME_PATH}/.config` -eq '1' ]]; then
          echo "TARGET_PROFILE=$(grep -Eo "CONFIG_TARGET.*DEVICE.*=y" ${HOME_PATH}/.config | sed -r 's/.*DEVICE_(.*)=y/\1/')" >> $GITHUB_ENV
        else
          echo "TARGET_PROFILE=${TARGET_PROFILE_DG}" >> $GITHUB_ENV
        fi
        
    - name: зј“еӯҳеҠ йҖҹ
      if: github.event.inputs.CACHEWRTBUILD_SWITCH == 'true'
      uses: stupidloud/cachewrtbuild@main
      with:
        ccache: 'true'
        mixkey: "${{ env.TARGET_PROFILE }}"
        prefix: ${{ github.workspace }}/openwrt

    - name: ејҖе§Ӣзј–иҜ‘еӣәд»¶
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "FILE_DATE=$(date +"%Y.%m%d.%H%M")" >> $GITHUB_ENV
        echo "date=$(date +'%m.%d')" >> $GITHUB_ENV
        cd "${HOME_PATH}/bin/targets/${TARGET_BOARD}/${TARGET_SUBTARGET}"
        mkdir -p ipk
        cp -rf $(find ${HOME_PATH}/bin/packages/ -type f -name "*.ipk") ipk/ && sync
        sudo tar -czf ipk.tar.gz ipk && sync
        sudo rm -rf ipk profiles.json packages
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: дёҠдј еӣәд»¶иҮіArtifacts
      if: steps.compile.outcome == 'success'&& github.event.inputs.UPLOAD_FIRMWARE == 'true' && !cancelled()
      uses: actions/upload-artifact@main
      with:
        name: ${{ env.SOURCE }}-${{ env.LUCI_VERSION }}-${{ env.TARGET_PROFILE }}-${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE_PATH }}

    - name: еҸ‘еёғеӣәд»¶еҲ°release
      if: steps.compile.outcome == 'success' && github.event.inputs.UPLOAD_RELEASE == 'true' && env.REPO_TOKEN
      uses: ncipollo/release-action@main
      with:
        name: ${{ env.SOURCE }}-${{ env.LUCI_VERSION }}-${{ env.TARGET_PROFILE }}
        tag: ${{ env.FILE_DATE }}
        token: ${{ secrets.REPO_TOKEN }}
        allowUpdates: true
        artifacts: "${{ env.FIRMWARE_PATH }}/*"

    - name: жё…зҗҶArtifacts
      if: env.REPO_TOKEN
      uses: Mattraks/delete-workflow-runs@v2
      with:
          token: ${{ secrets.REPO_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: ${{ inputs.days }}
          keep_minimum_runs: 0
    
    - name: еҲ йҷӨreleases
      if: env.REPO_TOKEN
      uses: danshui-git/delete-older-releases@main
      with:
        repo: ${{ github.repository }}
        keep_latest: ${{ inputs.rele }}
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
