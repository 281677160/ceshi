#
# 同步上游仓库或者清理发布都需要用REPO_TOKEN密匙
#
# 记住，同步上游是不会同步您任何自建文件夹的，所以同步后您要自己对比我现有的文件夹里面diy-part.sh和settings.ini文件有没有更新
#
# REPO_TOKEN密匙制作教程：https://git.io/jm.md
#


name: 同步上游仓库
on:
  workflow_dispatch:
    inputs:
      establish_name:
        description: '输入您需要创建的文件夹名称'
        required: false
        default: ''
      Deletefile_name:
        description: '请输入要删除的文件夹名称,一次删除多个请用英文逗号分开'
        required: false
        default: ''

env:
  REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
  TZ: Asia/Shanghai

jobs:
  del_runs:
    runs-on: Ubuntu-22.04
    name: 同步上游仓库
    
    steps:
    - name: 密匙检测（密匙为空则退出）
      run: |
        if [[ -z "${{ secrets.REPO_TOKEN }}" ]]; then
          echo "您没有设置仓库密匙，请按教程设置好密匙再来"
          echo "REPO_TOKEN密匙制作教程：https://git.io/jm.md"
          exit 1
        fi
    
    - name: 准备结束
      uses: actions/checkout@v2
      
    - name: 部署环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update > /dev/null 2>&1
        sudo -E apt-get -qq install -y git subversion git-core wget curl grep
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        sudo timedatectl set-timezone "Asia/Shanghai"
          
    - name: 创建文件夹
      if: env.REPO_TOKEN &&
      run: |
        cd $GITHUB_WORKSPACE
        git clone -b main https://github.com/281677160/ceshi shangyou
        git clone -b main https://github.com/${{github.repository}} repogx
        if [[ -z "${{ inputs.establish_name }}" ]]; then
          echo "文件夹名称为空，无法创建文件夹"
          exit 1
        elif [[ -d "repogx/${{ inputs.establish_name }}" ]]; then
          echo "${{ inputs.establish_name }}已存在，无法继续创建"
          exit 1
        else
          cp -Rf shangyou/build repogx/${{ inputs.establish_name }}
          cp -Rf .github/workflows/build-openwrt.yml repogx/.github/workflows/${{ inputs.establish_name }}.yml
          export X="repogx/.github/workflows/${{ inputs.establish_name }}.yml"
          FOLDER_NE2="FOLDER_NAME: .*"
          FOLDER_NE2="FOLDER_NAME: ${{ inputs.establish_name }}"
          sed -i "s?${FOLDER_NE1}?${FOLDER_NE2}?g" "${X}"
          yml_name1="$(grep 'name:' "${X}" |sed 's/^[ ]*//g' |grep -v '^#\|^-' |awk 'NR==1')"
          yml_name1="name: ${{ inputs.establish_name }}"
          sed -i "s?${yml_name1}?${yml_name2}?g" "${X}"
          echo "${{ inputs.establish_name }}文件夹创建完成"
        fi
        
        
    - name: 删除文件夹
      if: env.REPO_TOKEN
      run: |
        cd $GITHUB_WORKSPACE
        if [[ -z "${{ inputs.Deletefile_name }}" ]]; then
          echo "文件夹名称为空，无法删除文件夹"
          exit 1
        elif [[ ! -d "${{ inputs.establish_name }}" ]]; then
          echo "${{ inputs.inputs.establish_name }}不存在，无需删除"
          exit 1
        else
          if [[ ! -d "repogx" ]]; then
            git clone -b main https://github.com/${GIT_REPOSITORY}.git repogx
          fi
          aa="${{ inputs.Deletefile_name }}"
          bb=(${aa//,/ })
          for cc in ${bb[@]}; do
            rm -rf repogx/"$cc"
            rm -rf $(grep -rl "FOLDER_NAME: $cc" "repogx/.github/workflows" |sed 's/^[ ]*//g' |grep -v '^#\|compile')
            echo -e "\033[31m 已删除[${cc}]文件夹 \033[0m"
          done
        fi
        
    - name: 运行程序
      if: env.REPO_TOKEN
      run: |
        cd $GITHUB_WORKSPACE
        chmod -R 775 repogx
        cd repogx
        git add .
        git commit -m "up"
        git push --quiet "https://${{ secrets.REPO_TOKEN }}@github.com/${{github.repository}}" HEAD:main
